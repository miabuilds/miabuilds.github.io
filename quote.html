<style>
  :root {
    --bg:#F1F1EE; --surface:#FFFFFF; --surface-2:#F6F6F3;
    --ink:#1A1D24; --ink-soft:#565C68; --ink-faint:#8B909C;

    --accent:#0F766E; --accent-bright:#12968A; --accent-wash:#E2EFED; --amount:#0F766E;
    --shadow-sm:0 1px 2px rgba(26,29,36,.05);
    --shadow:0 2px 6px rgba(26,29,36,.06),0 16px 40px rgba(26,29,36,.07);
    --radius:16px;
    --font:"PingFang TC","Hiragino Sans","Noto Sans TC","Noto Sans JP",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;

      --ink:#ECECE7; --ink-soft:#ABB0BC; --ink-faint:#757B88;
      --line:#2B2F39; --line-strong:#3A3F4B;
      --accent:#2DD4BF; --accent-bright:#5EE6D4; --accent-wash:#16302D; --amount:#2DD4BF;
      --shadow-sm:0 1px 2px rgba(0,0,0,.3);
      --shadow:0 2px 6px rgba(0,0,0,.3),0 18px 44px rgba(0,0,0,.4); }
  }
  :root[data-theme="light"]{ --bg:#F1F1EE; --surface:#FFFFFF; --surface-2:#F6F6F3;
    --ink:#1A1D24; --ink-soft:#565C68; --ink-faint:#8B909C; --line:#E3E2DC; --line-strong:#CFCEC5;
    --accent:#0F766E; --accent-bright:#12968A; --accent-wash:#E2EFED; --amount:#0F766E;
    --shadow-sm:0 1px 2px rgba(26,29,36,.05); --shadow:0 2px 6px rgba(26,29,36,.06),0 16px 40px rgba(26,29,36,.07); }
  :root[data-theme="dark"]{ --bg:#14161B; --surface:#1C1F26; --surface-2:#22262F;
    --ink:#ECECE7; --ink-soft:#ABB0BC; --ink-faint:#757B88; --line:#2B2F39; --line-strong:#3A3F4B;
    --accent:#2DD4BF; --accent-bright:#5EE6D4; --accent-wash:#16302D; --amount:#2DD4BF;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3); --shadow:0 2px 6px rgba(0,0,0,.3),0 18px 44px rgba(0,0,0,.4); }

  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:var(--font); line-height:1.65;

  .wrap{ max-width:1080px; margin:0 auto; padding:clamp(24px,5vw,56px) clamp(16px,4vw,36px) 72px; }

  .hero{ display:flex; flex-direction:column; gap:16px; margin-bottom:40px; }
  .herotop{ display:flex; justify-content:space-between; align-items:flex-start; gap:16px; flex-wrap:wrap; }
  .eyebrow{ font-family:var(--mono); font-size:11.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin:0; }
  h1{ margin:0; font-size:clamp(28px,5.5vw,46px); font-weight:800; letter-spacing:-.01em; line-height:1.1; text-wrap:balance; }
  .hero p.sub{ margin:0; font-size:clamp(15px,2.2vw,18px); color:var(--ink-soft); max-width:60ch; }
  .trust{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .badge{ font-size:12.5px; color:var(--ink-soft); background:var(--surface); border:1px solid var(--line);
    border-radius:99px; padding:5px 12px; display:inline-flex; gap:6px; align-items:center; }

  .langbar{ display:inline-flex; background:var(--surface); border:1px solid var(--line); border-radius:9px; padding:3px; gap:2px; flex:0 0 auto; }
  .langbar button{ font-family:var(--font); font-size:13px; font-weight:600; border:none; background:transparent; color:var(--ink-faint);
    padding:5px 10px; border-radius:6px; cursor:pointer; transition:background .15s,color .15s; }
  .langbar button.on{ background:var(--accent); color:#fff; }
  .langbar button:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }

  .calc{ display:grid; grid-template-columns:1.35fr 1fr; gap:22px; align-items:start; }
  @media (max-width:820px){ .calc{ grid-template-columns:1fr; } }
  .panel{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow-sm); }
  .panel.inputs{ padding:clamp(18px,3vw,28px); display:flex; flex-direction:column; gap:24px; }

  .field{ display:flex; flex-direction:column; gap:10px; }
  .field > .lab{ font-size:13px; font-weight:700; color:var(--ink); display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .lab .hint{ font-weight:400; font-size:11.5px; color:var(--ink-faint); font-family:var(--mono); }

  select{ width:100%; font-family:var(--font); font-size:15px; color:var(--ink); background:var(--surface-2);
    border:1px solid var(--line-strong); border-radius:10px; padding:11px 12px; appearance:none; cursor:pointer;
    background-image:linear-gradient(45deg,transparent 50%,var(--ink-faint) 50%),linear-gradient(135deg,var(--ink-faint) 50%,transparent 50%);
    background-position:calc(100% - 18px) 55%,calc(100% - 13px) 55%; background-size:5px 5px,5px 5px; background-repeat:no-repeat; }
  select:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }

  .seg{ display:grid; grid-auto-flow:column; grid-auto-columns:1fr; gap:4px; background:var(--surface-2); border:1px solid var(--line); border-radius:11px; padding:4px; }
  .seg button{ font-family:var(--font); font-size:13px; color:var(--ink-soft); background:transparent; border:none; border-radius:8px;
    padding:9px 6px; cursor:pointer; transition:background .15s,color .15s; font-weight:600; line-height:1.3; }
  .seg button .mul{ display:block; font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); margin-top:2px; }
  .seg button[aria-pressed="true"]{ background:var(--accent); color:#fff; box-shadow:var(--shadow-sm); }
  .seg button[aria-pressed="true"] .mul{ color:rgba(255,255,255,.85); }
  .seg button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  @media (max-width:460px){ .seg{ grid-auto-flow:row; grid-auto-columns:auto; } }

  .rangewrap{ display:flex; align-items:center; gap:14px; }
  input[type=range]{ flex:1; appearance:none; height:6px; border-radius:99px; background:var(--line-strong); outline:none; }
  input[type=range]::-webkit-slider-thumb{ appearance:none; width:20px; height:20px; border-radius:50%; background:var(--accent); border:3px solid var(--surface); box-shadow:var(--shadow-sm); cursor:pointer; }
  input[type=range]::-moz-range-thumb{ width:20px; height:20px; border-radius:50%; background:var(--accent); border:3px solid var(--surface); cursor:pointer; }
  input[type=range]:focus-visible::-webkit-slider-thumb{ outline:2px solid var(--accent); outline-offset:2px; }
  .rangeval{ font-family:var(--mono); font-size:15px; font-weight:700; min-width:66px; text-align:right; font-variant-numeric:tabular-nums; color:var(--ink); }

  .addons{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  @media (max-width:460px){ .addons{ grid-template-columns:1fr; } }
  .addon{ display:flex; align-items:center; gap:10px; font-size:13.5px; cursor:pointer; background:var(--surface-2);
    border:1px solid var(--line); border-radius:10px; padding:10px 12px; user-select:none; transition:border-color .15s,background .15s; }
  .addon:hover{ border-color:var(--line-strong); }
  .addon input{ appearance:none; width:18px; height:18px; flex:0 0 auto; border:1.5px solid var(--line-strong); border-radius:5px; background:var(--surface); cursor:pointer; position:relative; }
  .addon input:checked{ background:var(--accent); border-color:var(--accent); }
  .addon input:checked::after{ content:""; position:absolute; left:5px; top:1.5px; width:5px; height:9px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg); }
  .addon input:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .addon:has(input:checked){ border-color:var(--accent); background:var(--accent-wash); }
  .addon .d{ margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--ink-faint); }

  .result{ position:sticky; top:20px; padding:clamp(20px,3vw,26px); display:flex; flex-direction:column; gap:18px; }
  .result .rhead{ display:flex; justify-content:space-between; align-items:center; }
  .result .rhead .t{ font-size:13px; font-weight:700; color:var(--ink-soft); }
  .cur{ display:inline-flex; background:var(--surface-2); border:1px solid var(--line); border-radius:8px; padding:3px; gap:2px; }
  .cur button{ font-family:var(--mono); font-size:11px; font-weight:700; border:none; background:transparent; color:var(--ink-faint); padding:4px 8px; border-radius:6px; cursor:pointer; }
  .cur button[aria-pressed="true"]{ background:var(--accent); color:#fff; }
  .cur button:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }

  .amount-main{ display:flex; flex-direction:column; gap:3px; }
  .amount-main .label{ font-size:12px; color:var(--ink-faint); font-family:var(--mono); letter-spacing:.08em; text-transform:uppercase; }
  .amount-main .val{ font-family:var(--mono); font-weight:800; font-size:clamp(24px,4.6vw,36px); color:var(--amount); font-variant-numeric:tabular-nums; letter-spacing:-.02em; line-height:1.05; }
  .amount-main .val .to{ color:var(--ink-faint); font-weight:600; font-size:.62em; margin:0 6px; }
  .amount-main .tax{ font-size:11.5px; color:var(--ink-faint); }

  .metrics{ display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line); border-radius:12px; overflow:hidden; border:1px solid var(--line); }
  .metric{ background:var(--surface); padding:12px 14px; display:flex; flex-direction:column; gap:2px; }
  .metric .k{ font-size:11.5px; color:var(--ink-faint); }
  .metric .v{ font-family:var(--mono); font-weight:700; font-size:16px; font-variant-numeric:tabular-nums; }
  .metric .v small{ font-size:11px; color:var(--ink-faint); font-weight:600; }

  .breakdown{ border-top:1px dashed var(--line-strong); padding-top:14px; display:flex; flex-direction:column; gap:7px; }
  .brow{ display:flex; justify-content:space-between; font-size:12.5px; color:var(--ink-soft); gap:12px; }
  .brow .bv{ font-family:var(--mono); font-variant-numeric:tabular-nums; color:var(--ink); flex:0 0 auto; }

  .copybtn{ margin-top:2px; width:100%; font-family:var(--font); font-size:14px; font-weight:700; background:var(--accent); color:#fff;
    border:none; border-radius:11px; padding:13px; cursor:pointer; transition:background .15s,transform .05s; display:inline-flex; justify-content:center; gap:8px; align-items:center; }
  .copybtn:hover{ background:var(--accent-bright); }
  .copybtn:active{ transform:translateY(1px); }
  .copybtn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .rate{ display:flex; flex-direction:column; gap:9px; background:var(--surface-2); border:1px dashed var(--line-strong); border-radius:12px; padding:13px 14px; }
  .rate .rt{ font-size:12px; font-weight:700; color:var(--ink-soft); display:flex; justify-content:space-between; gap:10px; }
  .rate .rt b{ font-family:var(--mono); color:var(--accent); }

  .below{ margin-top:52px; display:flex; flex-direction:column; gap:40px; }
  .sec h2{ font-size:clamp(18px,3vw,22px); font-weight:800; margin:0 0 4px; }
  .sec .lead{ color:var(--ink-soft); font-size:14px; margin:0 0 18px; }
  .cards3{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  @media (max-width:720px){ .cards3{ grid-template-columns:1fr; } }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow-sm); }
  .card .step{ font-family:var(--mono); font-size:12px; color:var(--accent); font-weight:700; }
  .card h3{ margin:6px 0; font-size:15.5px; }
  .card p{ margin:0; font-size:13.5px; color:var(--ink-soft); }
  .incl{ display:grid; grid-template-columns:1fr 1fr; gap:8px 20px; }
  @media (max-width:560px){ .incl{ grid-template-columns:1fr; } }
  .incl .row{ display:flex; gap:9px; font-size:13.5px; padding:5px 0; border-bottom:1px solid var(--line); }
  .incl .row .mk{ color:var(--accent); font-weight:800; }
  .incl .row.no .mk{ color:var(--ink-faint); }
  .incl .row.no{ color:var(--ink-faint); }
  .notes{ background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px; }
  .notes ul{ margin:0; padding-left:18px; display:flex; flex-direction:column; gap:7px; }
  .notes li{ font-size:13px; color:var(--ink-soft); }
  .notes b{ color:var(--ink); }

  footer{ margin-top:48px; border-top:1px solid var(--line); padding-top:22px; display:flex; flex-wrap:wrap; gap:10px 20px; align-items:center; justify-content:space-between; }
  footer .who{ font-weight:700; }
  footer .links{ display:flex; flex-wrap:wrap; gap:8px 16px; font-size:13.5px; }
  footer a{ color:var(--accent); text-decoration:none; }
  footer a:hover{ text-decoration:underline; }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--bg);
    font-size:13.5px; font-weight:600; padding:11px 18px; border-radius:99px; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; z-index:50; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>

      lbl.querySelector('.an').textContent=a.name[lang];
    });
    // included / excluded
    var inc=$('inclList'); inc.innerHTML='';
    t.incl.forEach(function(s){ var d=document.createElement('div'); d.className='row'; d.innerHTML='<span class="mk">✓</span> <span></span>'; d.lastChild.textContent=s; inc.appendChild(d); });
    t.excl.forEach(function(s){ var d=document.createElement('div'); d.className='row no'; d.innerHTML='<span class="mk">✕</span> <span></span>'; d.lastChild.textContent=s; inc.appendChild(d); });
    // notes (allow <b>)
    var nl=$('notesList'); nl.innerHTML='';
    t.notes.forEach(function(s){ var li=document.createElement('li'); li.innerHTML=s; nl.appendChild(li); });
  }
  function updateSeg(el, list, showMul){
    [].forEach.call(el.children,function(b){
      var item=list.filter(function(x){return x.id===b.dataset.id;})[0];
      var sub=b.querySelector('.mul');
      b.firstChild.nodeValue=item.name[lang];
      sub.textContent= showMul ? ('×'+item.mul) : item.sub[lang];
    });
  }

  function render(){
    var t=T(), p=ptype(), r=compute(), cur=state.currency;
    $('scaleHint').textContent=state.scale+' '+p.unit[lang];
    $('scaleVal').textContent=state.scale;
    $('rateVal').textContent=state.rate.toLocaleString('en-US');
    $('rateLabel').textContent='NT$'+state.rate.toLocaleString('en-US');
    $('amtLow').textContent=fmt(r.low,cur);
    $('amtHigh').textContent=fmt(r.high,cur);
    $('days').textContent=r.totalDays;
    $('weeks').textContent=t.approx+' '+r.weeks;
    $('deposit').textContent=fmt(r.deposit,cur);
    $('retainer').textContent=fmt(r.retainer,cur)+t.perMo;
    $('bCore').textContent=r.coreDays;
    $('bAdd').textContent=r.addDays;
    $('bRush').textContent=(r.rushMul.toFixed(2).replace(/\.?0+$/,'')||'1');
  }

  function summaryText(){
    var s=T().sum, r=compute(), cur=state.currency;
    var chosen=ADDONS.filter(function(a){return state.addons[a.id];}).map(function(a){return a.name[lang];});
    return [
      s.title,
      s.type+'：'+r.p.name[lang],
      s.scale+'：'+state.scale+' '+r.p.unit[lang]+'｜'+s.cx+'：'+r.c.name[lang]+'｜'+s.tl+'：'+r.t.name[lang],
      s.add+'：'+(chosen.length?chosen.join('、'):s.none),
      s.effort+' '+r.totalDays+' '+s.days,
      s.deliv+' '+r.weeks+' '+s.weeks,
      s.range+'：'+fmt(r.low,cur)+' ~ '+fmt(r.high,cur)+' '+s.untax,
      s.dep+'：'+fmt(r.deposit,cur)+'（40%）',
      '', s.note, s.contact+'：yujoulinforwork@gmail.com'
    ].join('\n');
  }

  var toast=$('toast');
  $('copy').addEventListener('click', function(){
    var txt=summaryText();
    var done=function(){ toast.classList.add('show'); setTimeout(function(){toast.classList.remove('show');},1800); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done,function(){fallback(txt,done);}); }
    else fallback(txt,done);
  });
  function fallback(txt,done){ var ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');done();}catch(e){} document.body.removeChild(ta); }

  // init
  $('rate').value=state.rate;
  setLang(lang);
})();
</script>
